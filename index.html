    <!-- Anti-FOUC: applica tema e dimensione font prima che React carichi -->
    <script>
    (function(){
      var h=document.documentElement;
      var t=localStorage.getItem('andryxify_tema_modalita');
      var f=localStorage.getItem('andryxify_font_dimensione');
      // Determina se applicare tema chiaro
      var chiaro=false;
      if(t==='chiaro'){chiaro=true;}
      else if(t==='scuro'){chiaro=false;}
      else if(t==='alba-tramonto'){
        // Approssimazione veloce per anti-FOUC: chiaro tra le 7:00 e le 19:00
        // ora locale (stessi valori usati in src/utils/sole.js come fallback).
        // Sufficiente prima che React carichi e ricalcoli alba/tramonto precisi.
        var ora=new Date().getHours();
        chiaro=(ora>=7&&ora<19);
      }
      else{
        // null o 'auto' → preferenza sistema
        chiaro=window.matchMedia('(prefers-color-scheme: light)').matches;
      }
      if(chiaro){h.setAttribute('data-tema','chiaro');}
      // Font: se impostato manualmente → applica; se null (primo accesso) → rileva default browser
      if(f&&f!=='normale'){
        h.setAttribute('data-font',f);
      } else if(!f){
        try{
          var el=document.createElement('div');
          el.style.cssText='position:fixed;top:-9999px;font-size:1rem;';
          document.head.appendChild(el);
          var fs=parseFloat(window.getComputedStyle(el).fontSize);
          document.head.removeChild(el);
          if(fs>=20){h.setAttribute('data-font','gigante');localStorage.setItem('andryxify_font_dimensione','gigante');}
          else if(fs>=18){h.setAttribute('data-font','grande');localStorage.setItem('andryxify_font_dimensione','grande');}
        }catch(e){}
      }
      // Ripristina anche il colore accent salvato
      var a=localStorage.getItem('andryxify_tema');
      var c={default:'#e040fb',magenta:'#ff4081',cyan:'#00e5ff',amber:'#ffb300',emerald:'#4ade80'};
      if(a&&c[a]){h.style.setProperty('--primary',c[a]);}
    })();
    </script>
